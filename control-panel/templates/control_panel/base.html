<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }}</title>
    <link rel="stylesheet" href="/static/control_panel/app.css">
</head>
<body>
<header class="top-bar">
    <div>
        <h1>{{ project_name }}</h1>
        <p>eKYC / cKYC operator console powered by Go microservices</p>
    </div>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/verifications/">Verification Queue</a>
        <a href="/appeals/">Appeals Queue</a>
        <a href="/activities/">Activity Feed</a>
    </nav>
</header>

<main>
    {% if messages %}
        <section class="alerts">
            {% for message in messages %}
                <article class="alert {{ message.tags }}">{{ message }}</article>
            {% endfor %}
        </section>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
