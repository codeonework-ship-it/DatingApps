openapi: 3.1.0
info:
  title: Verified Dating Gateway API
  version: 1.0.0
  description: |
    Mobile-facing API exposed by API Gateway + Mobile BFF.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Gateway health
      responses:
        '200':
          description: OK
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: Metrics payload
  /v1/auth/send-otp:
    post:
      summary: Send OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: OTP accepted
  /v1/auth/verify-otp:
    post:
      summary: Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                otp:
                  type: string
      responses:
        '200':
          description: Verification result
  /v1/discovery/{userID}:
    get:
      summary: Get discovery candidates
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: mode
          required: false
          schema:
            type: string
            enum: [all, spotlight]
      responses:
        '200':
          description: Candidate list with optional spotlight metadata (`is_spotlight`, `spotlight_tier`, `spotlight_score`, `spotlight_reason`) and response summary (`spotlight_summary`, `spotlight_profiles`).
  /v1/swipe:
    post:
      summary: Swipe target profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, target_user_id, is_like]
              properties:
                user_id:
                  type: string
                target_user_id:
                  type: string
                is_like:
                  type: boolean
      responses:
        '200':
          description: Swipe accepted
  /v1/matches/{userID}:
    get:
      summary: List matches
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Match list
  /v1/matches/{matchID}:
    delete:
      summary: Unmatch
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
        - in: query
          name: user_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Unmatch result
  /v1/matches/{matchID}/read:
    post:
      summary: Mark messages as read
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
      responses:
        '200':
          description: Read status updated
  /v1/profile/{userID}:
    get:
      summary: Get profile
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile payload
    put:
      summary: Upsert profile
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile:
                  type: object
      responses:
        '200':
          description: Upsert result
  /v1/profile/{userID}/summary:
    get:
      summary: Get profile summary and counters
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile summary
  /v1/profile/{userID}/draft:
    get:
      summary: Get mutable profile draft
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile draft payload
    patch:
      summary: Patch mutable profile draft
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated profile draft
  /v1/profile/{userID}/photos:
    post:
      summary: Add profile photo metadata
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                photo_url:
                  type: string
      responses:
        '200':
          description: Updated profile draft
  /v1/profile/{userID}/photos/{photoID}:
    delete:
      summary: Delete profile photo metadata
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
        - in: path
          name: photoID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated profile draft
  /v1/profile/{userID}/photos/reorder:
    post:
      summary: Reorder profile photos
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [photo_ids]
              properties:
                photo_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated profile draft
  /v1/profile/{userID}/complete:
    post:
      summary: Complete profile setup validation
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile completion accepted
  /v1/settings/{userID}:
    get:
      summary: Get user settings
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User settings payload
    patch:
      summary: Patch user settings
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: User settings payload
  /v1/emergency-contacts/{userID}:
    get:
      summary: List emergency contacts
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Contact list
    post:
      summary: Add emergency contact
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone_number]
              properties:
                name:
                  type: string
                phone_number:
                  type: string
      responses:
        '200':
          description: Contact list
  /v1/emergency-contacts/{userID}/{contactID}:
    put:
      summary: Update emergency contact
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
        - in: path
          name: contactID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone_number]
              properties:
                name:
                  type: string
                phone_number:
                  type: string
      responses:
        '200':
          description: Contact list
    delete:
      summary: Delete emergency contact
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
        - in: path
          name: contactID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Contact list
  /v1/blocked-users/{userID}:
    get:
      summary: List blocked users
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Blocked user list
  /v1/verification/{userID}:
    get:
      summary: Get verification state
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verification state
  /v1/verification/{userID}/submit:
    post:
      summary: Submit verification payload references
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Verification accepted
  /v1/chat/{matchID}/messages:
    get:
      summary: List chat messages
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Message list
    post:
      summary: Send chat message
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sender_id, text]
              properties:
                sender_id:
                  type: string
                text:
                  type: string
      responses:
        '200':
          description: Message created
        '423':
          description: Chat is locked pending engagement requirement completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatLockedErrorResponse'
              examples:
                chatLocked:
                  value:
                    success: false
                    error: chat is locked until quest requirement is completed
                    error_code: CHAT_LOCKED_REQUIREMENT_PENDING
                    match_id: m_123
                    unlock_state: quest_pending
                    unlock_policy_variant: require_quest_template
                    correlation_id: req-abc-123
  /v1/chat/{matchID}/messages/{messageID}:
    delete:
      summary: Delete a chat message for everyone
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
        - in: path
          name: messageID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requester_user_id]
              properties:
                requester_user_id:
                  type: string
      responses:
        '200':
          description: Message deleted for everyone
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  message_id:
                    type: string
                  reason_code:
                    type: string
                  delete_attempts_24h:
                    type: integer
                  delete_success_24h:
                    type: integer
                  delete_blocked_24h:
                    type: integer
                  delete_abuse_flagged:
                    type: boolean
        '409':
          description: Delete window expired
        '404':
          description: Message not found or requester not owner
  /v1/chat/gifts:
    get:
      summary: List available rose GIF gifts catalog
      responses:
        '200':
          description: Gifts catalog payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  gifts:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoseGiftCatalogItem'
                  count:
                    type: integer
  /v1/chat/{matchID}/gifts/send:
    post:
      summary: Send a rose gift in chat
      description: >
        Supports idempotent retries via `Idempotency-Key`. Repeat requests with
        the same key for the same actor and route replay the original response
        without charging wallet coins again.
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
          description: Client-generated key to prevent duplicate debits on retry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sender_user_id, receiver_user_id, gift_id]
              properties:
                sender_user_id:
                  type: string
                receiver_user_id:
                  type: string
                gift_id:
                  type: string
      responses:
        '200':
          description: Gift sent successfully
          headers:
            X-Idempotent-Replay:
              description: Present and `true` when response is served from idempotency replay cache.
              schema:
                type: string
                enum: ["true"]
          content:
            application/json:
              schema:
                type: object
                properties:
                  gift_send:
                    $ref: '#/components/schemas/RoseGiftSendView'
                  wallet:
                    $ref: '#/components/schemas/WalletView'
        '402':
          description: Insufficient wallet coins
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: insufficient wallet coins
                error_code: INSUFFICIENT_COINS
        '423':
          description: Chat is locked pending engagement requirement completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatLockedErrorResponse'
  /v1/chat/{matchID}/gifts/events:
    post:
      summary: Record rose gift telemetry event
      description: >
        Ingests client-side rose gift funnel events (for example panel open and
        preview open) into the backend activity stream for analytics dashboards.
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_name, user_id]
              properties:
                event_name:
                  type: string
                  enum:
                    - gift_panel_opened
                    - gift_preview_opened
                    - gift_send_attempted
                    - gift_send_succeeded
                    - gift_send_failed_insufficient_coins
                    - gift_send_failed_chat_locked
                    - gift_send_failed
                user_id:
                  type: string
                match_id:
                  type: string
                gift_id:
                  type: string
                tier:
                  type: string
                price_coins:
                  type: integer
                wallet_coins:
                  type: integer
                catalog_count:
                  type: integer
                is_limited:
                  type: boolean
                error_code:
                  type: string
                unlock_state:
                  type: string
                unlock_policy_variant:
                  type: string
                idempotency_key:
                  type: string
      responses:
        '202':
          description: Telemetry event accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
  /v1/wallet/{userID}/coins:
    get:
      summary: Get wallet coin balance for user
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Wallet balance payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallet:
                    $ref: '#/components/schemas/WalletView'
  /v1/wallet/{userID}/coins/buy:
    post:
      summary: Buy wallet coins and credit balance
      description: >
        Credits user wallet coins and writes a durable purchase transaction row.
        Supports idempotent retries via `Idempotency-Key` to avoid double credits.
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [coins]
              properties:
                package_id:
                  type: string
                coins:
                  type: integer
                  minimum: 1
                amount_minor:
                  type: integer
                  minimum: 0
                currency:
                  type: string
                provider:
                  type: string
                purchase_ref:
                  type: string
                idempotency_key:
                  type: string
      responses:
        '200':
          description: Wallet credited and purchase recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallet:
                    $ref: '#/components/schemas/WalletView'
                  purchase:
                    $ref: '#/components/schemas/WalletCoinPurchaseView'
  /v1/wallet/{userID}/coins/top-up:
    post:
      summary: Top-up user wallet coins (MVP controlled path)
      description: >
        In production-like environments this endpoint requires `X-Admin-User`
        to provide an audit actor for controlled top-up operations.
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
        - in: header
          name: X-Admin-User
          required: false
          schema:
            type: string
          description: Required in production/staging/preprod environments.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: integer
                  minimum: 1
                reason:
                  type: string
                requested_by:
                  type: string
      responses:
        '200':
          description: Wallet updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallet:
                    $ref: '#/components/schemas/WalletView'
                  audit:
                    type: object
                    properties:
                      receipt_id:
                        type: string
                      requested_by:
                        type: string
                      reason:
                        type: string
        '403':
          description: Missing required approver identity in production-like environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/wallet/{userID}/coins/audit:
    get:
      summary: List wallet and gift spend audit events for user
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Wallet audit events
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  count:
                    type: integer
                  audit:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityEvent'
  /v1/matches/{matchID}/unlock-state:
    get:
      summary: Get match unlock state
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Unlock status payload
          content:
            application/json:
              schema:
                type: object
                required: [match_id, unlock_state, has_requirement, chat_unlocked, unlock_policy_variant]
                properties:
                  match_id:
                    type: string
                  unlock_state:
                    type: string
                  has_requirement:
                    type: boolean
                  chat_unlocked:
                    type: boolean
                  unlock_policy_variant:
                    type: string
                    enum: [allow_without_template, require_quest_template]
  /v1/matches/{matchID}/quest-template:
    get:
      summary: Get match quest template
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quest template payload
    put:
      summary: Upsert match quest template
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                creator_user_id:
                  type: string
                prompt_text:
                  type: string
                min_chars:
                  type: integer
                max_chars:
                  type: integer
      responses:
        '200':
          description: Upserted quest template
  /v1/matches/{matchID}/unlock-requirements:
    post:
      summary: Alias for quest template upsert (compatibility)
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                creator_user_id:
                  type: string
                prompt_text:
                  type: string
                min_chars:
                  type: integer
                max_chars:
                  type: integer
      responses:
        '200':
          description: Upserted quest template
  /v1/matches/{matchID}/quests:
    get:
      summary: Alias for quest workflow fetch (compatibility)
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quest workflow payload
  /v1/matches/{matchID}/quest-workflow:
    get:
      summary: Get match quest workflow status
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quest workflow payload
  /v1/matches/{matchID}/quest-workflow/submit:
    post:
      summary: Submit quest response for review
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [submitter_user_id, response_text]
              properties:
                submitter_user_id:
                  type: string
                response_text:
                  type: string
      responses:
        '200':
          description: Quest submission accepted
  /v1/matches/{matchID}/quests/submit:
    post:
      summary: Alias for quest workflow submit (compatibility)
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [submitter_user_id, response_text]
              properties:
                submitter_user_id:
                  type: string
                response_text:
                  type: string
      responses:
        '200':
          description: Quest submission accepted
  /v1/matches/{matchID}/quests/{submissionID}/review:
    post:
      summary: Alias for quest workflow review (compatibility)
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
        - in: path
          name: submissionID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewer_user_id, decision_status]
              properties:
                reviewer_user_id:
                  type: string
                decision_status:
                  type: string
                  enum: [approved, rejected]
                review_reason:
                  type: string
      responses:
        '200':
          description: Quest review persisted
  /v1/matches/{matchID}/quest-workflow/review:
    post:
      summary: Review quest submission
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewer_user_id, decision_status]
              properties:
                reviewer_user_id:
                  type: string
                decision_status:
                  type: string
                  enum: [approved, rejected]
                review_reason:
                  type: string
      responses:
        '200':
          description: Quest review persisted
  /v1/matches/{matchID}/timeline:
    get:
      summary: List match engagement timeline
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Timeline entries
  /v1/matches/{matchID}/gestures:
    get:
      summary: Alias for engagement timeline listing (compatibility)
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Timeline-style gesture listing
    post:
      summary: Create digital gesture
      parameters:
        - in: path
          name: matchID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sender_user_id, receiver_user_id, gesture_type, content_text]
              properties:
                sender_user_id:
                  type: string
                receiver_user_id:
                  type: string
                gesture_type:
                  type: string
                content_text:
                  type: string
                tone:
