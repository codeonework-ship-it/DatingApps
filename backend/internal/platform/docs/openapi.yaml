components:
  schemas:
    ErrorResponse:
      type: object
      required: [success, error, error_code]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        error_code:
          type: string
        correlation_id:
          type: string
    ChatLockedErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [match_id, unlock_state]
          properties:
            error_code:
              type: string
              enum: [CHAT_LOCKED_REQUIREMENT_PENDING]
            match_id:
              type: string
            unlock_state:
              type: string
            unlock_policy_variant:
              type: string
              enum: [allow_without_template, require_quest_template]
    BillingCoexistenceMatrix:
      type: object
      required:
        - matrix_version
        - core_progression_non_blocking
        - core_progression_features
        - monetized_features
      properties:
        matrix_version:
          type: string
        core_progression_non_blocking:
          type: boolean
        core_progression_features:
          type: array
          items:
            type: string
        monetized_features:
          type: array
          items:
            type: object
            required:
              - feature_code
              - category
              - access
              - requires_subscription
              - blocks_core_progression
            properties:
              feature_code:
                type: string
              category:
                type: string
              access:
                type: string
              requires_subscription:
                type: boolean
              blocks_core_progression:
                type: boolean
              description:
                type: string
    ModerationAppeal:
      type: object
      required:
        - id
        - user_id
        - reason
        - status
        - sla_deadline_at
        - notification_policy
        - created_at
        - updated_at
      properties:
        id:
          type: string
        user_id:
          type: string
        report_id:
          type: string
        reason:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [submitted, under_review, resolved_upheld, resolved_reversed]
        resolution_reason:
          type: string
        reviewed_by:
          type: string
        reviewed_at:
          type: string
          format: date-time
        sla_deadline_at:
          type: string
          format: date-time
        notification_policy:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
