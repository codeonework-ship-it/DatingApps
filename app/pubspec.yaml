name: verified_dating_app
description: "Trust-first verified dating app for serious relationships. Enterprise-grade Flutter application with eKYC verification, AI safety systems, and real-time communication."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.9.0
  flutter_dotenv: ^5.2.1

  # Local persistence (terms acceptance)
  shared_preferences: ^2.2.3

  # Media picking (photo upload / verification)
  image_picker: ^1.1.2

  # State Management & Architecture
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0
  riverpod_annotation: ^2.3.0
  flutter_riverpod: ^2.4.0
  
  # Networking & API
  dio: ^5.3.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & UX
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0
  lottie: ^2.4.0

  # Navigation
  go_router: ^14.0.0

  # Utilities
  logger: ^2.1.0
  get_it: ^7.6.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^6.7.1
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - .env.local
    - assets/images/
    - assets/icons/
    - assets/animations/
